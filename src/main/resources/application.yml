server:
  port: 8080

spring:
  application:
    name: lesson-ai
  datasource:
    url: ${LESSON_AI_DB_URL:jdbc:postgresql://192.168.12.22:5432/lessonai}
    username: ${LESSON_AI_DB_USERNAME:lessonai_user}
    password: ${LESSON_AI_DB_PASSWORD:lessonai}
    driver-class-name: org.postgresql.Driver
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai
  flyway:
    enabled: true
    locations: classpath:db/migration
  web:
    resources:
      static-locations: classpath:/static/

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false
      id-type: auto

lesson-ai:
  jwt:
    secret: ${LESSON_AI_JWT_SECRET:ZGVtb19sZXNzb25fYWlfand0X3NlY3JldF9rZXlfZm9yX2Rldl9vbmx5XzEyMzQ1Njc4OTA=}
    expire-seconds: ${LESSON_AI_JWT_EXPIRE_SECONDS:604800}
  llm:
    default-name: ${LESSON_AI_LLM_DEFAULT_NAME:默认模型}
    provider-type: ${LESSON_AI_LLM_PROVIDER_TYPE:OPENAI_COMPATIBLE}
    base-url: ${LESSON_AI_LLM_BASE_URL:http://192.168.12.22:7898/v1}
    api-key: ${LESSON_AI_LLM_API_KEY:sk-dd5fcc6f18bcc70fbc56c5f6565de507bf37198e61e5f1a7302d81adeda80c9e}
    model-code: ${LESSON_AI_LLM_MODEL_CODE:gpt-4.1}
